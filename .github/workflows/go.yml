name: "Go Build & Test"
on: [ push ]
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - name: "Set up Go"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.26.0"
      - name: "Install Dependencies"
        run: make deps
      - name: "Build"
        run: make bin/main
      - name: "Test"
        run: make test
